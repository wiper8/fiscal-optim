name: R Checks & Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 2: Run Tests
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      
      - name: Install dependencies
        run: |
          install.packages(c('mockery', 'testthat', 'ggplot2'))
        shell: Rscript {0}
      
      - name: Run tests
        run: |
          source("R/tests/run-tests.R")
        shell: Rscript {0}

  # Job 2: Lint Check
  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      
      - name: Install lintr
        run: |
          install.packages('lintr')
        shell: Rscript {0}
      
      - name: Run lintr
        run: |
          lints <- lintr::lint_dir("R")
          if (length(lints) > 0) {
            print(lints)
            stop("Linting issues found! Please fix them.")
          } else {
            cat("✓ No linting issues found!\n")
          }
        shell: Rscript {0}

  # Job 3: Extract & Report TODOs
  todos:
    runs-on: ubuntu-latest
    name: Report TODOs
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Report TODO items
        id: todos
        run: |
          TODO_LINES=$(grep -r "TODO" . --exclude-dir=".git" --exclude-dir=".github" 2>/dev/null || true)

          if [ -n "$TODO_LINES" ]; then
            TODO_COUNT=$(printf "%s\n" "$TODO_LINES" | wc -l)
            echo "::notice::Found $TODO_COUNT TODO items"
            printf "%s\n" "$TODO_LINES" | while read line; do
              echo "::warning::$line"
            done
          else
            echo "::notice::✓ No TODO items found!"
          fi