name: R Checks & Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Lint Check
  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      
      - name: Install lintr
        run: |
          install.packages('lintr')
        shell: Rscript {0}
      
      - name: Run lintr
        run: |
          lints <- lintr::lint_dir("R")
          if (length(lints) > 0) {
            print(lints)
            stop("Linting issues found! Please fix them.")
          } else {
            cat("✓ No linting issues found!\n")
          }
        shell: Rscript {0}

  # Job 2: Run Tests
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      
      - name: Install dependencies
        run: |
          install.packages(c('mockery', 'testthat', 'ggplot2', 'scales'))
        shell: Rscript {0}
      
      - name: Run tests
        run: |
          source("R/run-tests.R")
        shell: Rscript {0}

  # Job 3: Extract & Report TODOs
  todos:
    runs-on: ubuntu-latest
    name: Report TODOs
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Find and report TODOs
        run: |
          todos=$(grep -rn "TODO" R/ --include="*.R" || true)
          if [ -z "$todos" ]; then
            echo "✓ No TODOs found!"
          else
            echo "📝 Found TODOs in your code:"
            echo ""
            echo "$todos"
            echo ""
            echo "⚠️ Remember to address these items!"
          fi
        shell: bash
